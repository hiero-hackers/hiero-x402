# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify (typecheck, lint, format, tests, coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com

      # The @hiero-hackers deps resolve from GitHub Packages — npm ci itself
      # needs the token (registry-url is set by setup-node above).
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run verify

      # The trust ladder's top rung is offline (committed proven blocks), so
      # the cryptographic-proof demo runs on every push — no keys, no network.
      - run: npm run provenance
