name: Release

# Publishes to the GitHub Packages npm registry when a version tag is pushed:
#   git tag -s v0.1.0 && git push origin v0.1.0
# The tag must match package.json's version — the guard step refuses otherwise.
# Only src/ ships (the "files" whitelist): the demo, tests, and research stay
# repo-only.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: Gates, then publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Tag must match package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match package.json version $version" >&2
            exit 1
          fi

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # A GitHub Release for the tag, with notes auto-generated from the merged
  # PRs and commits since the previous release — no hand-written changelog
  # to maintain or forget. Idempotent: a re-run skips an existing release.
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
