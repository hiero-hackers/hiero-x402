name: Feature request
description: Propose an addition or change
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What can't you do today?
      description: The use case, not the solution — what receipt do you need that you can't produce?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape (optional)
      description: >
        API sketch if you have one. Note the ground rules: the core stays pure
        (no I/O), and money stays bigint.
